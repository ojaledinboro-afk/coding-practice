<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="css/style.css" rel="stylesheet" />
    <title>BMI Calculator</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="bmi-container">
      <div class="title-info">
        <p class="title">BMI Calculator</p>
        <div class="unit-toggle">
          <button id="metricBtn" class="active">Metric</button>
          <button id="usBtn">US</button>
        </div>
        <p class="unit" id="unitLabel">Metric</p>
      </div>
      <div class="info">
        <div>
          <input type="text" id="weightInput" placeholder="Enter Weight" />
        </div>
        <div>
          <input type="text" id="heightInput" placeholder="Enter Height" />
        </div>
        <div><button type="submit" id="calculateButton">Calculate</button></div>
      </div>
    </div>

    <div class="output-container hidden">
      <div id="output"></div>
    </div>

    <script src="js/script.js"></script>
  </body>
</html>
